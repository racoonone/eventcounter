<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Counter Firebase</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{background:#111;color:white;font-family:-apple-system,Arial;margin:0}
.wrap{max-width:430px;margin:auto;padding:20px}
.card{background:#222;border-radius:18px;padding:18px;margin:12px 0}
#total{text-align:center;font-size:70px;font-weight:bold}
button{font-size:30px;width:60px;height:60px}
.row{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="wrap">
<h1>TOTAL ENTRIES</h1>
<div id="total">0</div>
<div id="list"></div>
<button onclick="resetAll()">RESET</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getFirestore,doc,onSnapshot,setDoc,updateDoc,increment} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyA1ZKxG-z1yafnh5B38xCc5VP0H6YUE_UE",
authDomain:"counter-kasse.firebaseapp.com",
projectId:"counter-kasse",
storageBucket:"counter-kasse.firebasestorage.app",
messagingSenderId:"588054951060",
appId:"1:588054951060:web:4bd57f30326eadf1263081"
});

const db=getFirestore(app);
const ref=doc(db,"counter","main");
const cats=["Online","Box Office","Free","Half"];

setDoc(ref,{Online:0,"Box Office":0,Free:0,Half:0},{merge:true});

onSnapshot(ref,s=>{
let d=s.data(); let sum=0; list.innerHTML="";
cats.forEach(c=>{
sum+=d[c]||0;
let e=document.createElement("div");
e.className="card";
e.innerHTML=`<div class=row>${c}<span><button>-</button> ${d[c]||0} <button>+</button></span></div>`;
let b=e.querySelectorAll("button");
b[0].onclick=()=>updateDoc(ref,{[c]:increment(-1)});
b[1].onclick=()=>updateDoc(ref,{[c]:increment(1)});
list.append(e);
});
total.innerHTML=sum;
});

window.resetAll=()=>setDoc(ref,{Online:0,"Box Office":0,Free:0,Half:0});
</script>
</body>
</html>
