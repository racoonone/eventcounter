<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entry Counter</title>
<style>
body{margin:0;background:#111;color:white;font-family:-apple-system,Arial}
.box{max-width:430px;margin:auto;padding:20px}
.card{background:#222;border-radius:18px;padding:18px;margin:12px 0}
h1{text-align:center}
#total{text-align:center;font-size:70px;font-weight:bold}
.row{display:flex;justify-content:space-between;align-items:center}
.name{font-size:22px}
.ctrl{display:flex;gap:10px;align-items:center}
button{width:60px;height:60px;font-size:32px;border-radius:12px;border:0}
.val{font-size:30px;width:45px;text-align:center}
.reset{width:100%;font-size:20px}
</style>
</head>
<body>
<div class="box">
<div class="card"><h1>TOTAL ENTRIES</h1><div id="total">0</div></div>
<div id="list"></div>
<div class="card"><button class="reset" id="reset">RESET</button></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyA1ZKxG-z1yafnh5B38xCc5VP0H6YUE_UE",
 authDomain:"counter-kasse.firebaseapp.com",
 projectId:"counter-kasse",
 storageBucket:"counter-kasse.firebasestorage.app",
 messagingSenderId:"588054951060",
 appId:"1:588054951060:web:4bd57f30326eadf1263081"
});

const db=getFirestore(app);
const ref=doc(db,"counter","main");
const cats=["Online","Box Office","Free","Half"];

await setDoc(ref,{Online:0,"Box Office":0,Free:0,Half:0},{merge:true});

onSnapshot(ref,(snap)=>{
const d=snap.data();
let sum=0;
list.innerHTML="";
cats.forEach(c=>{
sum+=d[c]||0;
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<div class="row"><div class="name">${c}</div>
<div class="ctrl"><button>-</button><div class="val">${d[c]||0}</div><button>+</button></div></div>`;
const b=div.querySelectorAll("button");
b[0].onclick=()=>updateDoc(ref,{[c]:increment(-1)});
b[1].onclick=()=>updateDoc(ref,{[c]:increment(1)});
list.appendChild(div);
});
total.innerText=sum;
});

reset.onclick=()=>setDoc(ref,{Online:0,"Box Office":0,Free:0,Half:0});
</script>
</body>
</html>
