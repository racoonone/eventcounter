<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entry Counter</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:-apple-system,Arial,sans-serif}
.container{max-width:430px;margin:auto;padding:20px}
.card{background:#1e1e1e;border-radius:18px;padding:16px;margin:14px 0}
h1{text-align:center;margin:0;font-size:22px}
#total{font-size:64px;font-weight:bold;text-align:center}
.row{display:flex;justify-content:space-between;align-items:center}
.name{font-size:22px}
.controls{display:flex;align-items:center;gap:10px}
button{width:58px;height:58px;font-size:30px;border:none;border-radius:12px}
.value{min-width:40px;text-align:center;font-size:30px;font-weight:bold}
.reset{width:100%;height:54px;font-size:20px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>TOTAL ENTRIES</h1>
<div id="total">0</div>
</div>
<div id="rows"></div>
<div class="card">
<button class="reset" id="resetBtn">Reset</button>
</div>
</div>
<script>
const categories=["Online","Box Office","Free","Half"];
let data=JSON.parse(localStorage.getItem("entryCounter")||"{}");
categories.forEach(c=>{if(typeof data[c]!=="number") data[c]=0;});

function save(){localStorage.setItem("entryCounter",JSON.stringify(data));}

function draw(){
 const rows=document.getElementById("rows");
 rows.innerHTML="";
 let total=0;
 categories.forEach(c=>{
   total+=data[c];
   const card=document.createElement("div");
   card.className="card";
   const row=document.createElement("div");
   row.className="row";
   const name=document.createElement("div");
   name.className="name";
   name.textContent=c;
   const controls=document.createElement("div");
   controls.className="controls";
   const minus=document.createElement("button");
   minus.textContent="−";
   const value=document.createElement("div");
   value.className="value";
   value.textContent=data[c];
   const plus=document.createElement("button");
   plus.textContent="+";
   minus.onclick=()=>{data[c]=Math.max(0,data[c]-1);save();draw();};
   plus.onclick=()=>{data[c]++;save();draw();};
   controls.append(minus,value,plus);
   row.append(name,controls);
   card.append(row);
   rows.append(card);
 });
 document.getElementById("total").textContent=total;
}
document.getElementById("resetBtn").onclick=()=>{
 if(confirm("Reset all counters?")){
   categories.forEach(c=>data[c]=0);
   save();
   draw();
 }
};
draw();
</script>
</body>
</html>
